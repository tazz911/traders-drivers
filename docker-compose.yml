version: '3.9'
services:
  server:
    build: ./server
    container_name: td_server
    ports: ['3002:3002']
    environment:
      PORT: 3002

  client:
    build: ./client
    container_name: td_client
    ports: ['5173:5173']
    depends_on: [server]
    environment:
      VITE_GOOGLE_MAPS_KEY: your_google_maps_key_here
